# .github/workflows/approval-check-worker.yml
name: Approval Check Worker

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write
  issues: read
  statuses: read

jobs:
  run-when-command:
    runs-on: ubuntu-latest
    outputs:
      number: ${{ steps.pr.outputs.number }}
      sha: ${{ steps.pr.outputs.sha }}
    steps:
      - name: Get latest PR head SHA
        id: pr
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # 8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.issue?.number ?? context.payload.pull_request?.number;
            if (!prNumber) {
              core.setFailed('Could not determine pull request number from event payload');
              return;
            }
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput('number', String(prNumber));
            core.setOutput('sha', pr.head.sha);

  fail-fork-review:
    permissions:
      contents: write
      pull-requests: write
      statuses: write
      issues: write
    runs-on: ubuntu-latest
    needs: run-when-command
    if: github.event_name == 'pull_request_review' && github.event.pull_request.head.repo.fork == true
    steps:
      - name: Fail required check so merge is blocked
        run: |
          echo "Fork PR detected on pull_request_review event - failing required check intentionally. Add a PR comment to trigger issue_comment workflow."
          exit 1

  check-approvals:
    runs-on: ubuntu-latest
    needs: run-when-command
    if: ${{ !(github.event_name == 'pull_request_review' && github.event.pull_request.head.repo.fork == true) }}
    permissions:
      contents: write
      pull-requests: write
      statuses: write
      issues: write
    steps:
      - name: Check approval
        run: echo "this would run if not from a fork pull_request_review event"