# it actually works now
name: Approval Check Worker

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  
permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write
  
jobs:
  run-when-command:
    runs-on: ubuntu-latest

    outputs:
      number: ${{ steps.pr.outputs.number }}
      sha: ${{ steps.pr.outputs.sha }}
      is_fork: ${{ steps.pr.outputs.is_fork }}

    steps:
      - name: Get latest PR head SHA
        id: pr
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # 8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.issue?.number ?? context.payload.pull_request?.number;
            if (!prNumber) {
              core.setFailed('Could not determine pull request number from event payload');
              return;
            }
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput('number', String(prNumber));
            core.setOutput('sha', pr.head.sha);
            
            // Detect if PR originates from a fork
            const baseFullName = `${context.repo.owner}/${context.repo.repo}`;
            const isFork = pr.head.repo?.full_name !== baseFullName;
            core.info(`PR #${prNumber} is_fork=${isFork}`); // debug log
            core.setOutput('is_fork', String(isFork));

  add-comment:
    runs-on: ubuntu-latest
    needs: run-when-command
    if: needs.run-when-command.outputs.is_fork == 'true'
    steps:
      - name: Add comment on PR
        id: add-comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # 8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.run-when-command.outputs.number }},
              body: 'This PR orignates from a fork. Adding a review comment to check the approval worker',
            });
