# it actually works now
name: Approval Check Worker

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  
permissions:
  contents: read
  pull-requests: read
  issues: write
  statuses: read
  
jobs:
  run-when-command:
    runs-on: ubuntu-latest

    outputs:
      number: ${{ steps.pr.outputs.number }}
      sha: ${{ steps.pr.outputs.sha }}

    steps:
      - name: Get latest PR head SHA
        id: pr
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # 8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.issue?.number ?? context.payload.pull_request?.number;
            if (!prNumber) {
              core.setFailed('Could not determine pull request number from event payload');
              return;
            }
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput('number', String(prNumber));
            core.setOutput('sha', pr.head.sha);

  add-comment:
    permissions:
      contents: read
      pull-requests: write
      issues: write
    runs-on: ubuntu-latest
    needs: run-when-command
    if: github.event_name == 'pull_request_review' && github.event.pull_request.head.repo.fork == true
    steps:
      - name: Add comment on PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # 8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.run-when-command.outputs.number }},
              body: [
                '⚠️ **Warning:** This PR originates from a fork.',
                '',
                '_Please write a comment on the PR for approval worker to work properly for fork repo PRs._',
                '',
                'Fork PR detected via pull_request_review.',
                '',
                '<b style="color: red;">Failing the required status check to ensure that PR cannot be merged</b>'
              ].join('\n'),
            });
            core.setFailed('Fork PR detected via pull_request_review. Failing the required status check until a maintainer posts an approval comment to re-trigger the worker via issue_comment.');

  check-approvals:
    runs-on: ubuntu-latest
    if: ${{ !(github.event_name == 'pull_request_review' && github.event.pull_request.head.repo.fork == true) }}
    needs: run-when-command
    permissions:
      contents: write
      pull-requests: write
      statuses: write
      issues: write
    steps:
      - name: Check approval
        id: check-approval
        run: |
          echo "this would run if not from a fork and pull request review event"
