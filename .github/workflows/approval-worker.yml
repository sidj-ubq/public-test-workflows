# it actually works now
name: Approval Check Worker

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  
permissions:
  contents: read
  pull-requests: read
  issues: write
  statuses: read
  
jobs:
  run-when-command:
    runs-on: ubuntu-latest

    outputs:
      number: ${{ steps.pr.outputs.number }}
      sha: ${{ steps.pr.outputs.sha }}

    steps:
      - name: Get latest PR head SHA
        id: pr
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # 8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.issue?.number ?? context.payload.pull_request?.number;
            if (!prNumber) {
              core.setFailed('Could not determine pull request number from event payload');
              return;
            }
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput('number', String(prNumber));
            core.setOutput('sha', pr.head.sha);

  add-comment:
    permissions:
      contents: read
      pull-requests: write
      issues: write
    runs-on: ubuntu-latest
    needs: run-when-command
    if: github.event_name == 'pull_request_review' && github.event.pull_request.head.repo.fork == true
    steps:
      - name: Add comment on PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # 8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.run-when-command.outputs.number }},
              body: [
                '> [!WARNING]',
                '> This pull request originates from a **fork**, so the `pull_request_review` event cannot reliably drive the approval workflow.',
                '',
                '> [!CAUTION]',
                '> The required **Approval Check Worker** status check has been intentionally failed, and this PR **cannot be merged** until status check pass.',
                '',
                '### How to unblock this PR',
                '',
                'Please write a comment on the PR, which will trigger the `issue_comment` event and re-run the approval worker; if passed it will allow the merge.',
                '',
                '_This extra step only applies to PRs opened from forks._'
              ].join('\n'),
            });
            core.setFailed('Fork PR detected on pull_request_review event - required status check failed on purpose. Waiting for a reviewer with write access to post an approval comment so the worker can re-run via issue_comment and turn this check green.');

  check-approvals:
    runs-on: ubuntu-latest
    if: ${{ !(github.event_name == 'pull_request_review' && github.event.pull_request.head.repo.fork == true) }}
    needs: run-when-command
    permissions:
      contents: write
      pull-requests: write
      statuses: write
      issues: write
    steps:
      - name: Check approval
        id: check-approval
        run: |
          echo "this would run if not from a fork and pull request review event"
